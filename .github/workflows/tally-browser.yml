name: Tally browser

on:
  pull_request:
    paths:
      - "src/tally/**"
      - "src/pages/api/tally/**"
      - "src/pages/tally/**"
      - "scripts/cloc-wasm-smoke.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/tally-browser.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run check
      - name: Smoke-test cloc under Perl/Wasm
        id: cloc
        continue-on-error: true
        run: bun scripts/cloc-wasm-smoke.ts > cloc-smoke.log 2>&1
      - name: Upload cloc smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloc-smoke-log
          path: cloc-smoke.log
      - name: Report cloc failure
        if: steps.cloc.outcome == 'failure'
        run: |
          cat cloc-smoke.log
          exit 1
      - run: bun run build
